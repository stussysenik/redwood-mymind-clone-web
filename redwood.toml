# MyMind Clone - RedwoodJS Configuration

[web]
  title = "MyMind Clone"
  port = 8913
  apiUrl = "/.redwood/functions"
  includeEnvironmentVariables = [
    "REDWOOD_ENV_SUPABASE_URL",
    "REDWOOD_ENV_SUPABASE_ANON_KEY",
  ]

[api]
  port = 8912

[browser]
  open = true

[notifications]
  versionUpdates = ["latest"]
